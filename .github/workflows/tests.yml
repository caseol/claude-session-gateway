name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  protocol-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest

      - name: Run protocol tests (offline, no model needed)
        run: python -m pytest tests/test_protocol.py -q
        env:
          PYTHONPATH: .
